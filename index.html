<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECU Training Portal – CSIS Faculty</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at top right, #c0392b, #7a0000, #1a0000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hdr {
            background: linear-gradient(135deg, #7a0000, #c0392b);
            padding: 30px 25px 50px;
            position: relative;
        }

        .hdr::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 35px;
            background: #fff;
            border-radius: 30px 30px 0 0;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            background: #fff;
            border-radius: 12px;
            padding: 5px;
            width: 80px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .hdr-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .faculty-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 3px 10px;
            font-size: 9px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
        }

        .body-content {
            padding: 0 30px 30px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .dline {
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .dtxt {
            font-size: 10px;
            color: #aaa;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fg {
            margin-bottom: 18px;
        }

        .lbl {
            font-size: 11px;
            font-weight: 800;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .inp {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            background: #fafafa;
        }

        .inp:focus {
            border-color: #c0392b;
            background: #fff;
        }

        .radio-row {
            display: flex;
            gap: 10px;
        }

        .ropt {
            flex: 1;
            cursor: pointer;
        }

        .ropt input {
            display: none;
        }

        .rlbl {
            display: block;
            text-align: center;
            padding: 10px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-weight: 700;
            color: #888;
            transition: 0.2s;
        }

        .ropt input:checked+.rlbl {
            border-color: #c0392b;
            background: #fff5f5;
            color: #c0392b;
        }

        .details-box {
            display: none;
            margin-top: 15px;
            border-left: 3px solid #c0392b;
            padding-left: 15px;
        }

        .entry-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .add-btn {
            background: #f8f8f8;
            border: 1px dashed #ccc;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #eee;
            border-color: #c0392b;
            color: #c0392b;
        }

        .upzone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upzone:hover {
            border-color: #c0392b;
            background: #fffafa;
        }

        .sbtn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7a0000, #c0392b);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(192, 57, 43, 0.2);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            transition: 0.4s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div id="toast" class="toast"></div>
    <div class="card">
        <div class="hdr">
            <div class="logo-row">
                <div class="logo-box"><img src="download.png" alt="ECU Logo"></div>
                <div class="hdr-text">
                    <h1>Egyptian Chinese University</h1>
                    <div class="faculty-badge">Faculty of CS & Info Systems</div>
                </div>
            </div>
        </div>

        <div class="body-content">
            <div class="fg" style="margin-top: 10px;">
                <label class="lbl">Student ID</label>
                <input class="inp" id="stuID" type="text" placeholder="Enter ID">
            </div>
            <div class="fg">
                <label class="lbl">Student Name</label>
                <input class="inp" id="stuName" type="text" placeholder="Full Name">
            </div>

            <div class="divider">
                <div class="dline"></div>
                <div class="dtxt">Planned Courses</div>
                <div class="dline"></div>
            </div>
            <div class="fg">
                <label class="lbl">Any planned courses to take?</label>
                <div class="radio-row">
                    <label class="ropt"><input type="radio" name="plan" value="No" checked
                            onchange="toggleBox('plannedDetails', this.value)"> <span class="rlbl">No</span></label>
                    <label class="ropt"><input type="radio" name="plan" value="Yes"
                            onchange="toggleBox('plannedDetails', this.value)"> <span class="rlbl">Yes</span></label>
                </div>
                <div id="plannedDetails" class="details-box">
                    <div id="plannedList">
                        <div class="entry-card planned-entry">
                            <input class="inp p-cert" type="text" placeholder="Course Name" style="margin-bottom:8px">
                            <input class="inp p-comp" type="text" placeholder="Company/Platform">
                        </div>
                    </div>
                    <button class="add-btn" onclick="addEntry('plannedList', 'planned-entry')">+ Add Another Planned
                        Course</button>
                </div>
            </div>

            <div class="divider">
                <div class="dline"></div>
                <div class="dtxt">Completed Training</div>
                <div class="dline"></div>
            </div>
            <div class="fg">
                <label class="lbl">Had any trainings?</label>
                <div class="radio-row">
                    <label class="ropt"><input type="radio" name="tr" value="No" checked
                            onchange="toggleBox('trainingDetails', this.value)"> <span class="rlbl">No</span></label>
                    <label class="ropt"><input type="radio" name="tr" value="Yes"
                            onchange="toggleBox('trainingDetails', this.value)"> <span class="rlbl">Yes</span></label>
                </div>
                <div id="trainingDetails" class="details-box">
                    <div id="trainingsList">
                        <div class="entry-card training-entry">
                            <input class="inp t-cert" type="text" placeholder="Certificate Name"
                                style="margin-bottom:8px">
                            <input class="inp t-comp" type="text" placeholder="Company Name">
                        </div>
                    </div>
                    <button class="add-btn" onclick="addEntry('trainingsList', 'training-entry')">+ Add Another
                        Completed Training</button>

                    <div class="upzone" onclick="document.getElementById('zipFile').click()">
                        <input type="file" id="zipFile" accept=".zip" onchange="updateFileName(this)"
                            style="display:none">
                        <span style="font-size: 24px;">📦</span>
                        <p id="filePrompt" style="font-size: 11px; color: #666; font-weight: bold; margin-top: 5px;">
                            Upload ONE ZIP file containing ALL certificates</p>
                    </div>
                </div>
            </div>

            <button class="sbtn" id="sbtn" onclick="doSubmit()">Submit Data →</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1AknMhalsrYkKuo5WgaySAPAwQs0TiVOCvL21kjJMGTCddCQzWOmbLVS8XMiK4qTh/exec";

        function toggleBox(id, val) {
            document.getElementById(id).style.display = (val === 'Yes') ? 'block' : 'none';
        }

        function addEntry(containerId, className) {
            const container = document.getElementById(containerId);
            const newEntry = container.firstElementChild.cloneNode(true);
            newEntry.querySelectorAll('input').forEach(i => i.value = '');
            container.appendChild(newEntry);
        }

        function updateFileName(inp) {
            if (inp.files[0]) {
                document.getElementById('filePrompt').textContent = "Selected: " + inp.files[0].name;
                document.getElementById('filePrompt').style.color = "#c0392b";
            }
        }

        function showToast(msg, ok = true) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.background = ok ? '#27ae60' : '#c0392b';
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        function doSubmit() {
            const btn = document.getElementById('sbtn');
            const id = document.getElementById('stuID').value.trim();
            if (!id) { showToast('Student ID is required', false); return; }

            let pCerts = []; document.querySelectorAll('.p-cert').forEach(i => { if (i.value) pCerts.push(i.value); });
            let pComps = []; document.querySelectorAll('.p-comp').forEach(i => { if (i.value) pComps.push(i.value); });
            let tCerts = []; document.querySelectorAll('.t-cert').forEach(i => { if (i.value) tCerts.push(i.value); });
            let tComps = []; document.querySelectorAll('.t-comp').forEach(i => { if (i.value) tComps.push(i.value); });

            btn.disabled = true; btn.textContent = "Processing...";

            let payload = {
                studentID: id,
                studentName: document.getElementById('stuName').value,
                hasPlanned: document.querySelector('input[name="plan"]:checked').value,
                plannedCert: pCerts.join(" | "),
                plannedComp: pComps.join(" | "),
                hasTraining: document.querySelector('input[name="tr"]:checked').value,
                certificate: tCerts.join(" | "),
                company: tComps.join(" | "),
                fileData: null, fileName: "", mimeType: "application/zip"
            };

            const fileInp = document.getElementById('zipFile');
            if (payload.hasTraining === 'Yes' && fileInp.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    payload.fileData = e.target.result.split(',')[1];
                    payload.fileName = id + "_Certs.zip";
                    sendData(payload);
                };
                reader.readAsDataURL(fileInp.files[0]);
            } else {
                sendData(payload);
            }
        }

        function sendData(payload) {
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
                .then(() => { showToast('Data submitted successfully!'); setTimeout(() => location.reload(), 2000); })
                .catch(() => { showToast('Submission Error', false); document.getElementById('sbtn').disabled = false; });
        }
    </script>
</body>

</html>
