<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECU Training Portal – CSIS Faculty</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at top right, #c0392b, #7a0000, #1a0000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hdr {
            background: linear-gradient(135deg, #7a0000, #c0392b);
            padding: 30px 25px 50px;
            position: relative;
        }

        /* الجزء المسؤول عن شكل المنحنى الأبيض */
        .hdr::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 35px;
            background: #fff;
            border-radius: 30px 30px 0 0;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            background: #fff;
            border-radius: 12px;
            padding: 5px;
            width: 80px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .hdr-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .faculty-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 3px 10px;
            font-size: 9px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
        }

        .body-content {
            padding: 0 30px 30px;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            text-align: center;
            color: #222;
        }

        .form-sub {
            font-size: 13px;
            color: #777;
            text-align: center;
            margin-bottom: 25px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .dline {
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .dtxt {
            font-size: 10px;
            color: #aaa;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fg {
            margin-bottom: 18px;
        }

        .lbl {
            font-size: 11px;
            font-weight: 800;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .inp,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
            background: #fafafa;
        }

        .inp:focus,
        select:focus {
            border-color: #c0392b;
            background: #fff;
        }

        .radio-row {
            display: flex;
            gap: 10px;
        }

        .ropt {
            flex: 1;
            cursor: pointer;
        }

        .ropt input {
            display: none;
        }

        .rlbl {
            display: block;
            text-align: center;
            padding: 10px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-weight: 700;
            color: #888;
            transition: 0.2s;
        }

        .ropt input:checked+.rlbl {
            border-color: #c0392b;
            background: #fff5f5;
            color: #c0392b;
        }

        .upzone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
            display: none;
            cursor: pointer;
        }

        .upzone.vis {
            display: block;
        }

        .sbtn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7a0000, #c0392b);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(192, 57, 43, 0.2);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            transition: 0.4s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <div id="toast" class="toast"></div>

    <div class="card">
        <div class="hdr">
            <div class="logo-row">
                <div class="logo-box">
                    <img src="download.png" alt="ECU Logo">
                </div>
                <div class="hdr-text">
                    <h1>Egyptian Chinese University</h1>
                    <div class="faculty-badge">Faculty of CS & Info Systems</div>
                </div>
            </div>
        </div>

        <div class="body-content">
            <h2 class="form-title">Training Submission</h2>
            <p class="form-sub">Fill your details and upload certificates</p>

            <div class="divider">
                <div class="dline"></div>
                <div class="dtxt">Personal Details</div>
                <div class="dline"></div>
            </div>

            <div class="fg">
                <label class="lbl">Student Name</label>
                <input class="inp" id="stuName" type="text" placeholder="Enter your full name">
            </div>

            <div class="fg">
                <label class="lbl">Student ID</label>
                <input class="inp" id="stuID" type="text" placeholder="Your University ID">
            </div>

            <div class="fg">
                <label class="lbl">Specialization</label>
                <select id="major">
                    <option value="">— Select Major —</option>
                    <option value="AI">Artificial Intelligence</option>
                    <option value="Cyber">Cyber Security</option>
                    <option value="Data">Data Science</option>
                    <option value="CS">Computer Science</option>
                </select>
            </div>

            <div class="divider">
                <div class="dline"></div>
                <div class="dtxt">Training Status</div>
                <div class="dline"></div>
            </div>

            <div class="fg">
                <label class="lbl">Have you completed any training?</label>
                <div class="radio-row">
                    <label class="ropt">
                        <input type="radio" name="tr" value="No" checked onchange="toggleUp()">
                        <span class="rlbl">No</span>
                    </label>
                    <label class="ropt">
                        <input type="radio" name="tr" value="Yes" onchange="toggleUp()">
                        <span class="rlbl">Yes</span>
                    </label>
                </div>

                <div class="upzone" id="upzone" onclick="document.getElementById('zipFile').click()">
                    <input type="file" id="zipFile" accept=".zip" onchange="pickFile(this)" style="display:none">
                    <span style="font-size: 24px;">📦</span>
                    <p id="filePrompt" style="font-size: 12px; color: #666;">Click to upload ZIP file</p>
                </div>
            </div>

            <button class="sbtn" id="sbtn" onclick="doSubmit()">Submit Data →</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";

        function toggleUp() {
            const isYes = document.querySelector('input[name="tr"]:checked').value === 'Yes';
            document.getElementById('upzone').style.display = isYes ? 'block' : 'none';
        }

        function pickFile(inp) {
            if (inp.files[0]) {
                document.getElementById('filePrompt').textContent = "Selected: " + inp.files[0].name;
                document.getElementById('upzone').style.borderColor = "#c0392b";
            }
        }

        function showToast(msg, ok = true) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = ok ? '#27ae60' : '#c0392b';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function doSubmit() {
            const btn = document.getElementById('sbtn');
            const name = document.getElementById('stuName').value.trim();
            const id = document.getElementById('stuID').value.trim();
            const major = document.getElementById('major').value;
            const hasTr = document.querySelector('input[name="tr"]:checked').value;
            const fileInp = document.getElementById('zipFile');

            if (!name || !id || !major) {
                showToast('Please fill all required fields', false);
                return;
            }

            btn.disabled = true;
            btn.textContent = "Processing...";

            let payload = {
                studentName: name,
                studentID: id,
                major: major,
                hasTraining: hasTr,
                fileData: null,
                fileName: ""
            };

            if (hasTr === 'Yes' && fileInp.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    payload.fileData = e.target.result.split(',')[1];
                    payload.fileName = id + "_" + fileInp.files[0].name;
                    sendData(payload);
                };
                reader.readAsDataURL(fileInp.files[0]);
            } else {
                sendData(payload);
            }
        }

        function sendData(payload) {
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
                .then(res => {
                    showToast('Data submitted successfully!');
                    setTimeout(() => location.reload(), 2000);
                })
                .catch(err => {
                    showToast('Error submitting data', false);
                    document.getElementById('sbtn').disabled = false;
                    document.getElementById('sbtn').textContent = "Submit Data →";
                });
        }
    </script>
</body>

</html>
